name: video-template-tool

services:
  # Redis - Task queue
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # CV 智能裁切微服务 (Python)
  cv-service:
    build: ./cv-service
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - UPLOAD_DIR=/app/uploads
    volumes:
      - upload_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  # API Server + Worker
  api:
    build: ./server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 前端地址（用于 Socket.IO CORS 校验）
      # 本地 docker-compose 通过 frontend 反代对外暴露 80 端口，所以这里用 http://localhost 最直观
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-random-string}
      - JWT_EXPIRES_IN=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FFMPEG_CONCURRENCY=${FFMPEG_CONCURRENCY:-1}
      - UPLOAD_DIR=./uploads
      - FILE_RETENTION_DAYS=7
      - MAX_FILE_SIZE=524288000
    volumes:
      - upload_data:/app/uploads
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      cv-service:
        condition: service_started
    networks:
      - app-network

  # Frontend (Nginx + reverse proxy)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
  upload_data:
  db_data:
